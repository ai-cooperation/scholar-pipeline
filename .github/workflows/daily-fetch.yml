name: Daily Semantic Scholar Fetch

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 台北 10:00
  workflow_dispatch:       # 手動觸發

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch papers
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python3 scripts/fetch.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/ .fetch-state.json
          if git diff --staged --quiet; then
            echo "No new papers"
          else
            COUNT=$(git diff --staged --name-only -- papers/ | wc -l)
            git commit -m "feat: fetch ${COUNT} new papers $(date -u +%Y-%m-%d)"
            git push
          fi
